<div class="login-container" [dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
  <!-- Dynamic Orbs for Depth -->
  <div class="orb orb-primary"></div>
  <div class="orb orb-secondary"></div>

  <div class="login-card animate-fade">
    <div class="logo-wrapper">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M12 8v4"/>
          <path d="M12 16h.01"/>
        </svg>
      </div>
      <h1 class="gradient-text">FASTO</h1>
      <p class="subtitle">{{ t('login.subtitle') }}</p>
    </div>

    <div class="form-container">
      <!-- Username Field -->
      <div class="input-group">
        <label for="username">{{ t('login.username') }}</label>
        <div class="input-wrapper">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            [placeholder]="t('login.username_placeholder')"
            (keyup.enter)="onLogin()"
            autocomplete="username"
          >
        </div>
      </div>

      <!-- Password Field -->
      <div class="input-group">
        <div class="label-row">
          <label for="password">{{ t('login.password') }}</label>
          <a class="forgot-link">{{ t('login.forgot') }}</a>
        </div>
        <div class="input-wrapper">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            (keyup.enter)="onLogin()"
            autocomplete="current-password"
          >
        </div>
      </div>

      <!-- Remember Me -->
      <div class="options-row">
        <label class="checkbox-container">
          <input type="checkbox" [(ngModel)]="rememberMe">
          <span class="checkmark"></span>
          {{ t('login.remember') }}
        </label>
      </div>

      <!-- Error Alert -->
      <div class="error-msg" *ngIf="errorMessage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button class="btn-submit" (click)="onLogin()" [disabled]="isLoading">
        <span *ngIf="!isLoading" class="btn-content">
          {{ t('login.btn') }}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="divider">
        <span>{{ t('login.or') }}</span>
      </div>

      <div class="register-cta">
        {{ t('login.no_account') }} <a (click)="goToRegister()">{{ t('login.register') }}</a>
      </div>
    </div>
  </div>

  <footer class="login-footer">
    {{ t('login.footer') }}
  </footer>
</div>

<header class="global-header" [dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
  <div class="header-left">
    <div class="logo-section" routerLink="/">
      <div class="logo-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M12 3L2 8.5V9h20V8.5L12 3z" fill="#6366F1" opacity="0.95"/>
          <path d="M4 11v7h3v-7H4zm6.5 0v7h3v-7h-3zM17 11v7h3v-7h-3z" fill="#A5B4FC" opacity="0.8"/>
          <path d="M2 20h20v2H2v-2z" fill="#E2E8F0" opacity="0.9"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">FASTO</span>
        <span class="logo-subtitle">{{ languageService.t('app.subtitle') }}</span>
      </div>
    </div>
  </div>

  <div class="header-center">
    <span class="page-title">{{ pageTitle }}</span>
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <button class="header-btn" [title]="languageService.t('app.notifications')" *ngIf="isLoggedIn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notification-badge" *ngIf="notifications > 0">{{ notifications }}</span>
    </button>

    <!-- Language Dropdown -->
    <div class="lang-dropdown-wrapper">
      <button class="lang-btn-header" (click)="showLangMenu = !showLangMenu">
        <span class="lang-flag">{{ getCurrentLangFlag() }}</span>
        <span class="lang-label">{{ getCurrentLangLabel() }}</span>
        <svg class="lang-chevron" [class.open]="showLangMenu" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="lang-dropdown" *ngIf="showLangMenu">
        <button *ngFor="let lang of availableLanguages"
                class="lang-option"
                [class.active]="lang.code === currentLang"
                (click)="selectLanguage(lang.code)">
          <span class="lang-flag">{{ lang.flag }}</span>
          <span>{{ lang.label }}</span>
          <svg *ngIf="lang.code === currentLang" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- User Profile -->
    <div class="user-profile" (click)="toggleProfileMenu()" *ngIf="isLoggedIn">
      <div class="user-avatar">{{ userInitials }}</div>
      <span class="user-name">{{ userName }}</span>
      <svg class="dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>

    <!-- Profile Dropdown -->
    <div class="profile-dropdown" *ngIf="showProfileMenu">
      <button class="dropdown-item" routerLink="/profile">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="7" r="4"></circle>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        </svg>
        {{ languageService.t('app.profile') }}
      </button>
      <button class="dropdown-item" routerLink="/settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-.33-.82l-.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0 .82.33l.06.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51-1z"></path>
        </svg>
        {{ languageService.t('app.settings') }}
      </button>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item logout" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        {{ languageService.t('app.logout') }}
      </button>
    </div>
  </div>
</header>
